<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JoshLabs — Independent App Studio</title>
    <meta
      name="description"
      content="JoshLabs — 独立移动应用品牌。AskBible.me、JoshMoney、Cabinet X、My Class。"
    />
    <meta property="og:title" content="JoshLabs — Independent App Studio" />
    <meta
      property="og:description"
      content="Practical mobile apps with privacy-first design. AskBible.me, JoshMoney, Cabinet X, and My Class."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://joshlabs.app/assets/icons/joshlabs.png" />
    <meta name="theme-color" content="#121110" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" href="/assets/icons/joshlabs.svg" type="image/svg+xml" />
    <link rel="icon" href="/assets/icons/joshlabs.png" type="image/png" sizes="512x512" />
    <link rel="apple-touch-icon" href="/assets/icons/joshlabs.png" sizes="512x512" />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <header class="topbar" id="topbar">
      <div class="shell topbar__inner">
        <a class="brand" href="/">
          <span class="brand__mark" aria-hidden="true">JL</span>
          <span class="brand__name">Josh<span class="wordmark__labs">Labs</span></span>
        </a>
        <a class="topbar__contact" href="mailto:josh.zeng.ca@gmail.com">Contact</a>
      </div>
    </header>

    <main>
      <section class="lead shell">
        <p class="lead__eyebrow">Independent App Studio</p>
        <h1 class="lead__title">Josh<span class="wordmark__labs">Labs</span></h1>
        <p class="lead__tagline">Practical mobile apps. Privacy-first.</p>
      </section>

      <section class="apps shell" aria-label="Apps by JoshLabs">
        <div class="apps__grid">
          <a
            class="app-tile"
            data-app="askbible"
            data-status="live"
            href="https://askbible.me"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span class="app-tile__icon">
              <img src="assets/icons/askbible.png" alt="AskBible.me" width="120" height="120" />
            </span>
            <span class="app-tile__name">AskBible.me</span>
            <span class="app-tile__meta"><span class="app-tile__dot"></span>Scripture</span>
          </a>

          <a class="app-tile" data-app="joshmoney" data-status="live" href="/joshmoney/">
            <span class="app-tile__icon">
              <img src="assets/icons/joshmoney.png" alt="JoshMoney" width="120" height="120" />
            </span>
            <span class="app-tile__name">JoshMoney</span>
            <span class="app-tile__meta"><span class="app-tile__dot"></span>Bookkeeping</span>
          </a>

          <a class="app-tile" data-app="cabinet-x" data-status="review" href="/cabinet-x/">
            <span class="app-tile__icon">
              <img src="assets/icons/cabinet-x.png" alt="Cabinet X" width="120" height="120" />
            </span>
            <span class="app-tile__name">Cabinet X</span>
            <span class="app-tile__meta"><span class="app-tile__dot"></span>Kitchen Design</span>
          </a>

          <a class="app-tile" data-app="my-class" data-status="live" href="/my-class/">
            <span class="app-tile__icon">
              <img src="assets/icons/my-class.png" alt="My Class" width="120" height="120" />
            </span>
            <span class="app-tile__name">My Class</span>
            <span class="app-tile__meta"><span class="app-tile__dot"></span>Bible Study</span>
          </a>
        </div>
      </section>
    </main>

    <footer class="shell site-footer">
      <p><a href="mailto:josh.zeng.ca@gmail.com">josh.zeng.ca@gmail.com</a></p>
      <p>© <span id="year"></span> Joshua Zeng · Josh<span class="wordmark__labs">Labs</span></p>
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();

      const topbar = document.getElementById("topbar");
      const toggleTopbar = () => {
        topbar.classList.toggle("is-scrolled", window.scrollY > 8);
      };
      toggleTopbar();
      window.addEventListener("scroll", toggleTopbar, { passive: true });
    </script>
  </body>
</html>
